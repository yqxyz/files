name: "Build FFmpeg (built-in + x264, musl static) on Ubuntu ARM"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          fetch-depth: 1
          ref: master

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            make \
            musl-tools \
            pkg-config \
            yasm \
            nasm \
            git \
            autoconf \
            automake \
            libtool

      - name: Build libx264 (static, musl)
        run: |
          git clone --depth 1 --branch stable https://code.videolan.org/videolan/x264.git
          cd x264
          ./configure \
            --prefix=$(pwd)/dist \
            --host=aarch64-linux-musl \
            --enable-static \
            --disable-cli \
            --disable-asm \
            --cross-prefix= \
            --extra-cflags="-static -O3 -march=armv8-a"
          make -j$(nproc)
          make install
          echo "X264_PATH=$(pwd)/dist" >> $GITHUB_ENV

      - name: Setup environment
        run: |
          echo "FFMPEG_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'git-master')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          mkdir -p build_output

      - name: Configure FFmpeg
        run: |
          ./configure \
            --prefix=$(pwd)/build_output \
            --cc=musl-gcc \
            --cxx=musl-g++ \
            --pkg-config=pkg-config \
            --enable-static \
            --disable-shared \
            --disable-ffplay \
            --enable-gpl \
            --enable-libx264 \
            --enable-ffmpeg \
            --enable-ffprobe \
            --enable-avdevice \
            --enable-swscale \
            --enable-network \
            --enable-protocols \
            --enable-filters \
            --enable-encoders \
            --enable-decoders \
            --enable-muxers \
            --enable-demuxers \
            --enable-parsers \
            --enable-bsfs \
            --enable-asm \
            --enable-neon \
            --enable-runtime-cpudetect \
            --extra-cflags="-static -O3 -march=armv8-a -I$X264_PATH/include" \
            --extra-ldflags="-static -L$X264_PATH/lib" \
            --extra-libs="-lpthread -lm"

      - name: Build FFmpeg
        run: |
          make -j$(nproc)
          make install

      - name: Strip binaries
        run: |
          strip --strip-all build_output/bin/ffmpeg
          strip --strip-all build_output/bin/ffprobe

      - name: Verify x264 support
        run: |
          build_output/bin/ffmpeg -encoders | grep libx264 || echo "Warning: libx264 not found"
          build_output/bin/ffmpeg -version

      - name: Package artifact
        run: |
          cd build_output/bin
          tar -czf ffmpeg-x264-arm64-musl-static.tar.gz ffmpeg ffprobe
          cd ../..
          sha256sum build_output/bin/ffmpeg-x264-arm64-musl-static.tar.gz > checksum.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-x264-arm64-musl-static
          path: |
            build_output/bin/ffmpeg-x264-arm64-musl-static.tar.gz
            checksum.txt
          retention-days: 90
