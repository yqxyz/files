name: Build FFmpeg (audio only, musl static) on Ubuntu ARM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # GitHub 官方 ARM64 runner
    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          fetch-depth: 1

      - name: Install musl toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            musl-tools \
            pkg-config \
            yasm nasm \
            libopus-dev \
            libvorbis-dev \
            libmp3lame-dev \
            libfdk-aac-dev \
            libspeex-dev

      - name: Configure FFmpeg (static, audio only)
        run: |
          ./configure \
            --cc=musl-gcc \
            --enable-static \
            --disable-shared \
            --disable-everything \
            --enable-demuxer=mov,mp3,aac,flac,ogg,wav,matroska \
            --enable-decoder=mp3,aac,flac,vorbis,opus,pcm_*,ac3 \
            --enable-muxer=mp4,ipod,adts,rawaudio \
            --enable-filter=aresample,atrim,asplit,astreamselect,volume,pan \
            --enable-protocol=file \
            --disable-programs \
            --enable-ffmpeg \
            --enable-avcodec \
            --enable-avformat \
            --enable-avfilter \
            --enable-swresample \
            --disable-avdevice \
            --disable-swscale \
            --disable-doc \
            --extra-cflags="-static -march=armv8-a" \
            --extra-ldflags="-static"

      - name: Build
        run: make -j$(nproc)

      - name: Strip debug symbols
        run: strip ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-audio-arm64-musl-static
          path: ffmpeg
