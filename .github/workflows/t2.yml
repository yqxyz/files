name: Build FFmpeg (audio only, musl static) for ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # GitHub 官方 ARM64 runner
    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          fetch-depth: 1

      - name: Build static binary in Alpine container
        run: |
          docker run --rm -v $PWD:/work -w /work alpine:latest /bin/sh -c '
            # 更新包索引并安装编译工具链
            apk update
            apk add --no-cache --update \
              build-base \
              linux-headers \
              pkgconfig \
              yasm nasm \
              opus-dev vorbis-dev lame-dev fdk-aac-dev speex-dev \
              make binutils

            # 配置 FFmpeg（仅音频相关）
            ./configure \
              --enable-static \
              --disable-shared \
              --disable-everything \
              --enable-demuxer=mov,mp3,aac,flac,ogg,wav,matroska \
              --enable-decoder=mp3,aac,flac,vorbis,opus,pcm_*,ac3 \
              --enable-filter=aresample,atrim,asplit,astreamselect,volume,pan \
              --enable-protocol=file \
              --disable-programs \
              --enable-ffmpeg \
              --enable-avcodec \
              --enable-avformat \
              --enable-avfilter \
              --enable-swresample \
              --disable-avdevice \
              --disable-swscale \
              --disable-doc \
              --extra-cflags="-static -march=armv8-a" \
              --extra-ldflags="-static" \
              --pkg-config-flags="--static"

            # 编译
            make -j$(nproc)

            # 去除调试符号
            strip ffmpeg
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-audio-arm64-musl-static
          path: ffmpeg
