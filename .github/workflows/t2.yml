name: Build FFmpeg (audio only, musl static) for ARM64

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # ARM64 原生 runner
    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: master
          fetch-depth: 1

      - name: Build static binary with musl (Alpine container)
        run: |
          docker run --rm -v $PWD:/work -w /work alpine:latest sh -c '
            # 安装编译依赖
            apk add --no-cache \
              build-base \
              linux-headers \
              pkgconfig \
              yasm \
              nasm \
              opus-dev \
              vorbis-dev \
              lame-dev \
              fdk-aac-dev \
              speex-dev

            # 配置 FFmpeg（仅音频相关）
            ./configure \
              --enable-static \
              --disable-shared \
              --disable-everything \
              --enable-demuxer=mov,mp3,aac,flac,ogg,wav,matroska \
              --enable-decoder=mp3,aac,flac,vorbis,opus,pcm_*,ac3 \
              --enable-filter=aresample,atrim,asplit,astreamselect,volume,pan \
              --enable-protocol=file \
              --disable-programs \
              --enable-ffmpeg \
              --enable-avcodec \
              --enable-avformat \
              --enable-avfilter \
              --enable-swresample \
              --disable-avdevice \
              --disable-swscale \
              --disable-doc \
              --extra-cflags="-static -march=armv8-a" \
              --extra-ldflags="-static" \
              --pkg-config-flags="--static"

            # 编译
            make -j$(nproc)

            # 去除调试符号，减小体积
            strip ffmpeg
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-audio-arm64-musl-static
          path: ffmpeg
          if-no-files-found: error
