name: Build Android Wheels

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64, armv7]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: pyda/cibuildwheel@v2.16
        env:
          CIBW_ARCHS: ${{ matrix.target }}
          CIBW_BUILD: cp311-*
          CIBW_ENVIRONMENT: >
            CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
            CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CIBW_BEFORE_ALL: |
            # 下载 NDK
            wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
            unzip android-ndk-r26b-linux.zip
            export NDK_HOME=$(pwd)/android-ndk-r26b
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl
