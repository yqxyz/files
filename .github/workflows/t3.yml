name: Build FFmpeg ARM64 musl static

on:  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04-arm64  # GitHub 官方 ARM64 运行器
    steps:
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build FFmpeg statically with musl
        run: |
          wget https://ffmpeg.org/releases/ffmpeg-6.1.1.tar.xz
          tar -xf ffmpeg-6.1.1.tar.xz
          cd ffmpeg-6.1.1
          ./configure \
            --arch=aarch64 \
            --target-os=linux \
            --disable-shared \
            --enable-static \
            --extra-ldflags="-static" \
            --cc=musl-gcc \
            --cxx=musl-g++ \
            --prefix=/tmp/ffmpeg-build
          make -j$(nproc)
          make install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-arm64-musl-static
          path: /tmp/ffmpeg-build/bin/ffmpeg
