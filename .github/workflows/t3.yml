name: "Build FFmpeg (built-in only, musl static) on Ubuntu ARM"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          fetch-depth: 1
          ref: master

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            make \
            musl-tools \
            pkg-config \
            yasm \
            nasm

      - name: Setup environment
        run: |
          echo "FFMPEG_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'git-master')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          mkdir -p build_output

      - name: Configure FFmpeg
        run: |
          ./configure \
            --prefix=$(pwd)/build_output \
            --cc=musl-gcc \
            --cxx=musl-g++ \
            --enable-static \
            --disable-shared \
            --disable-ffplay \
            --enable-gpl \
            --enable-ffmpeg \
            --enable-ffprobe \
            --enable-avdevice \
            --enable-swscale \
            --enable-network \
            --enable-protocols \
            --enable-filters \
            --enable-encoders \
            --enable-decoders \
            --enable-muxers \
            --enable-demuxers \
            --enable-parsers \
            --enable-bsfs \
            --enable-asm \
            --enable-neon \
            --enable-runtime-cpudetect \
            --extra-cflags="-static -O3 -march=armv8-a" \
            --extra-ldflags="-static"

      - name: Build FFmpeg
        run: |
          make -j$(nproc)
          make install

      - name: Strip binaries
        run: |
          strip --strip-all build_output/bin/ffmpeg
          strip --strip-all build_output/bin/ffprobe

      - name: Package artifact
        run: |
          cd build_output/bin
          tar -czf ffmpeg-builtin-arm64-musl-static.tar.gz ffmpeg ffprobe
          cd ../..
          sha256sum build_output/bin/ffmpeg-builtin-arm64-musl-static.tar.gz > checksum.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-builtin-arm64-musl-static
          path: |
            build_output/bin/ffmpeg-builtin-arm64-musl-static.tar.gz
            checksum.txt
          retention-days: 90
