          strip --strip-all build_output/bin/ffplay
          strip --strip-all build_output/bin/ffprobe
          ls -lh build_output/bin/

      - name: Create version info
        run: |
          cat > build_output/bin/README.txt << EOF
          ====================================
          FFmpeg Static Build (ARM64 / musl)
          ====================================
          
          版本: ${{ env.FFMPEG_VERSION }}
          构建日期: ${{ env.BUILD_DATE }}
          架构: ARM64 (aarch64)
          
          包含组件:
          - H.264/H.265 编解码
          - VP8/VP9 编解码
          - MP3/AAC/Opus/Vorbis 音频
          - 常用滤镜和字幕支持
          - HTTPS/RTMP 推流
          
          使用方法:
          ./ffmpeg -i input.mp4 output.mp4
          EOF

      - name: Package artifact
        run: |
          cd build_output/bin
          tar -czf ffmpeg-common-arm64-musl-static.tar.gz ffmpeg ffplay ffprobe README.txt
          cd ../..
          
          sha256sum build_output/bin/ffmpeg-common-arm64-musl-static.tar.gz > checksum.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-common-arm64-musl-static
          path: |
            build_output/bin/ffmpeg-common-arm64-musl-static.tar.gz
            checksum.txt
          retention-days: 90
