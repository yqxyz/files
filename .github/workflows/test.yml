name: Build FFmpeg (audio extraction only) for ARM64

on:

  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # ARM64 原生 runner，速度更快

    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: master            # 可使用特定版本，如 n6.1.1
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            libtool \
            pkg-config \
            nasm \
            libopus-dev \
            libvorbis-dev \
            libmp3lame-dev \
            libfdk-aac-dev \
            libspeex-dev

      - name: Configure FFmpeg (audio only)
        run: |
          ./configure \
            --enable-static \
            --disable-shared \
            --disable-everything \
            --enable-demuxer=mov,mp3,aac,flac,ogg,wav,matroska \
            --enable-decoder=mp3,aac,flac,vorbis,opus,pcm_*,ac3 \
            --enable-filter=aresample,atrim,asplit,astreamselect,volume,pan \
            --enable-protocol=file \
            --disable-programs \
            --enable-ffmpeg \
            --enable-avcodec \
            --enable-avformat \
            --enable-avfilter \
            --enable-swresample \
            --disable-avdevice \
            --disable-swscale \
            --disable-doc \
            --extra-cflags="-march=armv8-a"

      - name: Build
        run: make -j$(nproc)

      - name: Strip binary (reduce size)
        run: strip ffmpeg

      - name: Test audio extraction (optional)
        run: |
          ./ffmpeg -version
          ./ffmpeg -demuxers | grep -E "mov|mp3|aac|flac|ogg|wav"
          ./ffmpeg -decoders | grep -E "mp3|aac|flac|vorbis|opus|ac3"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-audio-arm64
          path: ffmpeg
          if-no-files-found: error
