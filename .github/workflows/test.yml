name: Build FFmpeg (audio only) for ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # ARM64 原生 runner

    steps:
      - name: Checkout FFmpeg source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential libtool pkg-config \
            libopus-dev libvorbis-dev libmp3lame-dev libfdk-aac-dev \
            libspeex-dev libx264-dev   # 音频相关可选依赖

      - name: Configure FFmpeg (audio only)
        run: |
          ./configure \
            --enable-static \
            --disable-shared \
            --disable-everything \
            --enable-demuxer=mov,mp3,aac,flac,ogg,wav,matroska \
            --enable-decoder=mp3,aac,flac,vorbis,opus,pcm_*,ac3 \
            --enable-filter=aresample,atrim,asplit,astreamselect \
            --enable-protocol=file \
            --disable-programs \
            --enable-ffmpeg \
            --enable-avcodec --enable-avformat --enable-avfilter \
            --enable-swresample \
            --disable-avdevice --disable-postproc \
            --disable-doc \
            --extra-cflags="-march=armv8-a"   # 针对 ARM64 优化

      - name: Build
        run: make -j$(nproc)

      - name: Strip binary (optional)
        run: strip ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-audio-arm64
          path: ffmpeg
